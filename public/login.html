<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chamber Certificates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#011f49',
                        secondary: '#00A39C',
                        accent: '#fbbf24',
                        dark: '#020617'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-bg {
            background: linear-gradient(135deg, #011f49 0%, #023059 40%, #00A39C 100%);
            background-attachment: fixed;
        }
        .auth-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 20% 80%, rgba(0,163,156,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(251,191,36,0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .auth-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255,255,255,0.05);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(0, 163, 156, 0.2);
        }
    </style>
</head>
<body class="auth-bg min-h-screen flex items-center justify-center p-4 relative">
    <div class="relative z-10 max-w-md w-full">
        <!-- Logo & Title -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/20 mb-5 shadow-lg">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Chamber Certificates</h1>
            <p class="mt-1.5 text-sm text-white/75">Sign in to manage your certificates</p>
        </div>

        <!-- Login Card -->
        <div class="auth-card bg-white rounded-2xl p-8 border border-slate-100">
            <h2 class="text-xl font-semibold text-slate-800 mb-6">Welcome back</h2>

            <div id="alert" class="hidden mb-5 p-4 rounded-xl text-sm"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-600 mb-1.5">Email Address</label>
                    <input type="email" id="email" required
                        class="input-focus w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50/50 focus:bg-white focus:border-secondary transition placeholder:text-slate-400"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-600 mb-1.5">Password</label>
                    <input type="password" id="password" required
                        class="input-focus w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50/50 focus:bg-white focus:border-secondary transition placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 text-secondary border-slate-300 rounded focus:ring-secondary">
                        <span class="ml-2 text-sm text-slate-600">Remember me</span>
                    </label>
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full py-3.5 rounded-xl font-semibold text-white bg-gradient-to-r from-primary to-secondary hover:shadow-lg hover:shadow-primary/20 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2">
                    Sign in
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-white/60 text-xs">© Chamber Certificates. All rights reserved.</p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');

        function showAlert(message, type = 'error') {
            alert.className = 'block mb-5 p-4 rounded-xl text-sm ' + (
                type === 'error' ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-emerald-50 text-emerald-700 border border-emerald-100'
            );
            alert.textContent = message;
            setTimeout(() => { alert.className = 'hidden'; }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
                } else {
                    showAlert(data.error || 'Login failed');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        if (localStorage.getItem('token')) window.location.href = '/dashboard';
    </script>
</body>
</html>
